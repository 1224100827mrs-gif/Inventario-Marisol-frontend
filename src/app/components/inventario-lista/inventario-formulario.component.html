<div class="container mt-4" style="max-width: 600px;">
  <div class="card shadow">
    <div class="card-header bg-dark text-white">
      <h4 class="mb-0">{{ esEditar ? ' Editar Producto' : 'Agregar Nuevo Producto' }}</h4>
    </div>
    <div class="card-body">
      <form (ngSubmit)="guardar()">
        <div class="mb-3">
          <label class="form-label">Nombre del Producto</label>
          <input type="text" class="form-label form-control" name="nombreProducto" [(ngModel)]="producto.nombreProducto" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Descripción</label>
          <textarea class="form-label form-control" name="descripcion" [(ngModel)]="producto.descripcion"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Categoría</label>
          <input type="text" class="form-label form-control" name="categoria" [(ngModel)]="producto.categoria" required />
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Precio</label>
            <input type="number" class="form-label form-control" name="precio" [(ngModel)]="producto.precio" required />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Stock</label>
            <input type="number" class="form-label form-control" name="stock" [(ngModel)]="producto.stock" required />
          </div>
        </div>

        <div class="mb-3 form-check form-switch">
          <input class="form-check-input" type="checkbox" id="activoSwitch" name="activo" [(ngModel)]="producto.activo">
          <label class="form-check-label" for="activoSwitch">Producto Activo en Sistema</label>
        </div>

        <div class="d-flex justify-content-end gap-2">
          <a routerLink="/" class="btn btn-secondary">Cancelar</a>
          <button type="submit" class="btn btn-success">Guardar Cambios</button>
        </div>
      </form>
    </div>
  </div>
</div>
